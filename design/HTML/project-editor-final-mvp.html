<span class="text-xs font-medium text-slate-200" style="">Scene 01</span>
<div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="material-symbols-outlined text-xs text-slate-500 hover:text-white" style="">refresh</button>
<button class="material-symbols-outlined text-xs text-slate-500 hover:text-red-400" style="">delete</button>

<span class="text-[10px] font-bold text-accent-green drop-shadow-[0_0_8px_#39ff14]" style="">PROCESSING...</span>

</div>
<div class="flex items-center justify-between px-1">
<span class="text-xs font-medium text-slate-400" style="">Scene 02</span>

<span class="text-xs font-medium text-slate-500" style="">Scene 03 (Queued)</span>
</div>
</div>
</div>

<div class="flex flex-1 flex-col overflow-y-auto p-5 gap-6 custom-scrollbar">
<!-- Scene Settings Content -->
<div class="flex flex-col gap-5">
<div class="space-y-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-slate-400" style="">Scene Name</label>
<input class="w-full rounded-lg border border-border-dark bg-slate-800/50 px-3 py-2 text-sm text-slate-100 focus:border-accent-green focus:ring-0" type="text" value="Scene 01 - Amalfi Dusk">
</div>
<div class="space-y-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-slate-400" style="">Scene Context (AI Prompt)</label>
<textarea class="w-full rounded-lg border border-border-dark bg-slate-800/50 px-3 py-2 text-sm text-slate-100 focus:border-accent-green focus:ring-0 resize-none" placeholder="Describe the scene's emotional weight and lighting details..." rows="4">Deep golden hour, volumetric lighting, slight mist over the Mediterranean, hyper-realistic parallax depth.</textarea>
</div>
<div class="space-y-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-slate-400" style="">Motion Preset</label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border border-border-dark bg-slate-800/50 px-3 py-2 text-sm text-slate-100 focus:border-accent-green focus:ring-0">

<option selected="">Cinematic Push</option>
<option>Parallax Tilt</option>
<option>Vertical Scroll</option>
</select>

</div>
</div>

<button class="rounded-md bg-slate-700 py-1.5 text-[10px] font-bold text-accent-green uppercase" style="">Balanced</button>
<button class="rounded-md py-1.5 text-[10px] font-bold text-slate-400 hover:text-white uppercase" style="">Background</button>
</div>
</div>
<!-- Project Settings Section (Visible if user clicks tab, but shown here as requested) -->
<div class="pt-4 border-t border-border-dark space-y-5">

<textarea class="w-full rounded-lg border border-border-dark bg-slate-800/50 px-3 py-2 text-sm text-slate-100 focus:border-accent-green focus:ring-0 resize-none" rows="2">A cinematic journey along the Italian coast during summer sunset.</textarea>
</div>
<div class="flex items-center justify-between">
<label class="text-[10px] font-bold uppercase tracking-widest text-slate-400" style="">Story Pace</label>
<div class="flex items-center gap-2 rounded-full bg-slate-800/50 px-2 py-1">
<span class="text-[10px] font-bold px-2 py-0.5 rounded-full text-slate-500" style="">Calm</span>
<span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-accent-green text-background-dark" style="">Balanced</span>
<span class="text-[10px] font-bold px-2 py-0.5 rounded-full text-slate-500" style="">Fast</span>
</div>
</div>
<div class="flex items-center justify-between">
<label class="text-[10px] font-bold uppercase tracking-widest text-slate-400" style="">Reduced Motion</label>
<button class="relative h-5 w-10 rounded-full bg-slate-700" style="">
<div class="absolute left-1 top-1 h-3 w-3 rounded-full bg-slate-400"></div>
</button>
</div>
<div class="flex items-center justify-between rounded-lg bg-slate-900/50 border border-border-dark p-3">
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500" style="">Output Format</span>
<span class="text-sm font-bold text-slate-300" style="">9:16 Portrait</span>
</div>
<span class="material-symbols-outlined text-slate-600" style="">lock</span>
</div>
</div>
</div>
</div>
<div class="p-5 border-t border-border-dark">
<button class="flex w-full items-center justify-center gap-2 rounded-lg border border-accent-green/30 bg-accent-green/10 py-3 text-xs font-bold uppercase tracking-widest text-accent-green hover:bg-accent-green hover:text-background-dark transition-all" style="">
<span class="material-symbols-outlined" style="">restart_alt</span> Reprocess Scene
                    </button>
